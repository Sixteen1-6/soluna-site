<body>

  <section class="section wrap">
    <div class="pdp" id="pdp"></div>
  </section>

  <section class="section wrap" id="related-wrap">
    <div class="section-head">
      <div>
        <h2 class="display">In the same light</h2>
        <div class="sub serif-it">The rest of the first drop.</div>
      </div>
      <a class="view-all" href="shop.html">View all</a>
    </div>
    <div class="grid-products" id="related-grid"></div>
  </section>

  <script src="js/catalog.js"></script>
  <script src="js/site.js"></script>
  <script>
    function pageInit() {
      const id = new URLSearchParams(location.search).get("id") || PRODUCTS[0].id;
      const p = PRODUCTS.find(x => x.id === id) || PRODUCTS[0];
      setProductSEO(p);

      document.getElementById("pdp").innerHTML = `
        <div class="pdp-art">${productArt(p, { tilt: -6 })}</div>
        <div class="pdp-info">
          <div class="cat">${p.category} &middot; ${BRAND.name}</div>
          <h1 class="display">${p.name}</h1>
          <div class="price">Coming soon</div>
          <div class="blurb">${p.blurb}</div>
          <div class="swatches">${p.swatches.map(s => `<i style="background:${s}"></i>`).join("")}</div>
          <div class="pdp-actions">
            <form data-signup="pdp-${p.id}">
              <div class="signup form" style="display:flex;gap:10px">
                <input type="email" name="email" placeholder="Your email" aria-label="Email" required>
                <button class="btn btn-accent" type="submit">Notify me</button>
              </div>
            </form>
            <div class="ok">You are on the list. We will write the moment the first drop opens.</div>
            <a class="btn btn-outline-dark btn-block" href="shop.html">Keep looking</a>
          </div>
          <div class="pdp-note">A small first batch out of Lexington, Kentucky. No charge today, we will only reach out when it is ready.</div>
        </div>`;

      const related = PRODUCTS.filter(x => x.id !== p.id).slice(0, 4);
      document.getElementById("related-grid").innerHTML = related.map(productCard).join("");
    }
  </script>
